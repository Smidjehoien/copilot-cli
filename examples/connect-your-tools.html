<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connect your tools</title>
    <style>
      :root {
        --bg-left: #6b46db;
        --bg-mid: #9e56b0;
        --bg-right: #ef6e68;
        --icon-white: #f4f4f5;
        --icon-accent: #b3569a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(120deg, var(--bg-left) 10%, var(--bg-mid) 52%, var(--bg-right) 95%);
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      .icons {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 54px;
        transform: translateY(12px);
      }

      .circle {
        width: 154px;
        aspect-ratio: 1;
        border-radius: 50%;
        background: var(--icon-white);
        position: relative;
      }

      .linear-mark {
        overflow: hidden;
      }

      .stripe {
        position: absolute;
        width: 16px;
        height: 104px;
        background: linear-gradient(120deg, #c65fa4, #a24c9d);
        border-radius: 10px;
        transform: rotate(-46deg);
        left: 44px;
        bottom: -8px;
      }

      .stripe.s2 {
        left: 65px;
      }

      .stripe.s3 {
        left: 86px;
      }

      .stripe.s4 {
        left: 107px;
      }

      .mask {
        position: absolute;
        width: 128px;
        height: 128px;
        border-radius: 50%;
        bottom: -64px;
        left: -64px;
        background: linear-gradient(120deg, var(--bg-left) 0%, var(--bg-mid) 60%);
      }

      .plus {
        display: grid;
        place-items: center;
      }

      .plus::before,
      .plus::after {
        content: "";
        position: absolute;
        background: var(--icon-accent);
        border-radius: 8px;
      }

      .plus::before {
        width: 66px;
        height: 18px;
      }

      .plus::after {
        width: 18px;
        height: 66px;
      }

      @media (max-width: 680px) {
        .icons {
          gap: 26px;
          transform: none;
        }

        .circle {
          width: 120px;
        }

        .stripe {
          height: 82px;
          width: 12px;
          left: 34px;
        }

        .stripe.s2 { left: 50px; }
        .stripe.s3 { left: 66px; }
        .stripe.s4 { left: 82px; }

        .mask {
          width: 98px;
          height: 98px;
          bottom: -50px;
          left: -50px;
        }

        .plus::before {
          width: 52px;
          height: 14px;
        }

        .plus::after {
          width: 14px;
          height: 52px;
        }
      }
    </style>
  </head>
  <body>
    <main class="icons" aria-label="Linear and add integration symbols">
      <div class="circle linear-mark" aria-hidden="true">
        <span class="stripe"></span>
        <span class="stripe s2"></span>
        <span class="stripe s3"></span>
        <span class="stripe s4"></span>
        <span class="mask"></span>
      </div>
      <div class="circle plus" aria-hidden="true"></div>
    </main>
  </body>
</html>
