<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connect your tools</title>
    <style>
      :root {
        --bg-start: #6445db;
        --bg-mid: #9b53b5;
        --bg-end: #ea6f73;
        --icon-bg: #ececec;
        --icon-accent: #b4579f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        display: grid;
        place-items: center;
        background: linear-gradient(125deg, var(--bg-start) 4%, var(--bg-mid) 52%, var(--bg-end) 96%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }

      .logos {
        display: flex;
        align-items: center;
        gap: clamp(26px, 5vw, 86px);
      }

      .logo {
        width: clamp(120px, 11vw, 220px);
        aspect-ratio: 1;
        border-radius: 50%;
        background: var(--icon-bg);
        position: relative;
        overflow: hidden;
      }

      .logo.linear::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background:
          linear-gradient(
            45deg,
            transparent 38%,
            var(--icon-accent) 38% 44%,
            transparent 44% 52%,
            var(--icon-accent) 52% 58%,
            transparent 58% 66%,
            var(--icon-accent) 66% 72%,
            transparent 72% 80%,
            var(--icon-accent) 80% 86%,
            transparent 86%
          );
      }

      .logo.plus::before,
      .logo.plus::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: clamp(50px, 5vw, 100px);
        height: clamp(12px, 1.1vw, 22px);
        border-radius: 999px;
        background: var(--icon-accent);
        transform: translate(-50%, -50%);
      }

      .logo.plus::after {
        transform: translate(-50%, -50%) rotate(90deg);
      }
    </style>
  </head>
  <body>
    <main class="logos" aria-label="Connected tools illustration">
      <div class="logo linear" aria-label="Linear logo"></div>
      <div class="logo plus" aria-label="Add integration"></div>
    </main>
  </body>
</html>
