<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connect your tools</title>
    <style>
      :root {
        --bg-start: #6544dc;
        --bg-mid: #9a54b5;
        --bg-end: #ec6d74;
        --icon-bg: #eeeeef;
        --icon-accent: #b3579f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        display: grid;
        place-items: center;
        background: linear-gradient(125deg, var(--bg-start) 2%, var(--bg-mid) 51%, var(--bg-end) 98%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }

      .logos {
        display: flex;
        align-items: center;
        gap: clamp(38px, 5vw, 84px);
        transform: translateY(5vh);
      }

      .logo {
        width: clamp(108px, 11vw, 168px);
        aspect-ratio: 1;
        border-radius: 50%;
        background: var(--icon-bg);
        position: relative;
        overflow: hidden;
      }

      .logo.linear::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background:
          linear-gradient(
            45deg,
            transparent 38%,
            var(--icon-accent) 38% 43.4%,
            transparent 43.4% 51.6%,
            var(--icon-accent) 51.6% 57%,
            transparent 57% 65.2%,
            var(--icon-accent) 65.2% 70.6%,
            transparent 70.6% 78.8%,
            var(--icon-accent) 78.8% 84.2%,
            transparent 84.2%
          );
      }

      .logo.plus::before,
      .logo.plus::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: clamp(42px, 4vw, 70px);
        height: clamp(11px, 0.95vw, 16px);
        border-radius: 999px;
        background: var(--icon-accent);
        transform: translate(-50%, -50%);
      }

      .logo.plus::after {
        transform: translate(-50%, -50%) rotate(90deg);
      }

      @media (max-width: 700px) {
        .logos {
          gap: clamp(16px, 6vw, 36px);
          transform: translateY(3vh);
        }
      }
    </style>
  </head>
  <body>
    <main class="logos" aria-label="Connected tools illustration">
      <div class="logo linear" aria-label="Linear logo"></div>
      <div class="logo plus" aria-label="Add integration"></div>
    </main>
  </body>
</html>
